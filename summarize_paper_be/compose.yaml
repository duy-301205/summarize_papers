services:
  postgres:
    image: 'pgvector/pgvector:pg16'
    container_name: summarize_db_container
    environment:
      - 'POSTGRES_DB=summarize_db'
      - 'POSTGRES_USER=postgres'
      - 'POSTGRES_PASSWORD=1111'
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d summarize_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
# Redis
  redis:
    image: 'redis:latest'
    container_name: summarize_redis_container
    ports:
      - '6379:6379'
    # Tùy chọn: Thêm healthcheck để đảm bảo Redis sẵn sàng
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  postgres_data:



