services:
  postgres:
    image: 'pgvector/pgvector:pg16'
    container_name: summarize_db_container
    environment:
      - 'POSTGRES_DB=summarize_db'
      - 'POSTGRES_USER=postgres'
      - 'POSTGRES_PASSWORD=1111'
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d summarize_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: