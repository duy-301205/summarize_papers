server:
  port: 8085

spring:
  application:
    name: summarize_paper

  datasource:
    url: jdbc:postgresql://localhost:5432/summarize_db
    username: postgres
    password: 1111
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  upload:
    dir: ${UPLOAD_DIR:./uploads}
    max-size: ${UPLOAD_MAX_SIZE:10MB}

cloudinary:
  cloud-name: ${CLOUDINARY_NAME:dxobmvnzz}
  api-key: ${CLOUDINARY_API_KEY:738821659235984}
  api-secret: ${CLOUDINARY_API_SECRET:Uzs4A4IJ26M1Ey_Xg8knt0_0DSs}