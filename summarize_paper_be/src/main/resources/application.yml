server:
  port: 8085

spring:
  application:
    name: summarize_paper

  datasource:
    url: jdbc:postgresql://localhost:5432/summarize_db
    username: postgres
    password: 1111
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    access-expiration: 3600000
    refresh-expiration: 604800000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  upload:
    dir: ./uploads
    max-size: 10MB