server:
  port: 8085

spring:
  application:
    name: summarize_paper

  # C?u h́nh k?t n?i PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/summarize_db
    username: postgres
    password: 1111
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate # Flyway s? qu?n lư schema, Hibernate ch? ki?m tra
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  upload:
    dir: ./uploads
    max-size: 10MB